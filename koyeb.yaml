services:
  - name: kust-music-bot
    git:
      repo: "https://github.com/kustbots/kustmusic"
      branch: main
    dockerfile_path: Dockerfile
    routes:
      - name: web
        path: "/"
    ports:
      - 8080
    instance_type: micro
    env:
      API_ID: ""
      API_HASH: ""
      BOT_TOKEN: ""
      ASSISTANT_SESSION: ""
      OWNER_ID: ""
      SEARCH_API_URL: ""
      DOWNLOAD_API_BASE: ""
      YOUTUBE_COOKIES: ""
